# HostGator deploy via FTPS — same pipeline as utah-boiler-experts / saddleupai-site.

name: Deploy to HostGator

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-seo-bot
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          timeout: 120000
          local-dir: ./seo-bot/
          server-dir: ./seo-bot/
          state-name: .ftp-deploy-sync-state-seo-bot.json
          exclude: |
            **/.git/**
            **/.git*
            **/.github/**
            **/.DS_Store
